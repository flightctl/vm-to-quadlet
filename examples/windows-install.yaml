apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: windows-vm
spec:
  running: true
  dataVolumeTemplates:
  - metadata:
      name: rootdisk
    spec:
      storage:
        resources:
          requests:
            storage: 64Gi
  template:
    spec:
      domain:
        firmware:
          bootloader:
            efi:
              secureBoot: false
        cpu:
          cores: 2
          sockets: 1
          threads: 1
        features:
          acpi:
            enabled: true
          apic:
            enabled: true
          hyperv:
            relaxed: { enabled: true }
            vapic: { enabled: true }
            spinlocks: { enabled: true, spinlocks: 8191 }
        clock:
          utc: {}
          timer:
            hpet: { present: false }
            pit: { tickPolicy: delay }
            rtc: { tickPolicy: catchup }
            hyperv: { present: true }
        devices:
          disks:
          - disk:
              bus: sata
            cache: writeback
            name: rootdisk
            bootOrder: 2
          - cdrom:
              bus: sata
              readonly: true
            name: windows-iso
            bootOrder: 1
          - cdrom:
              bus: sata
              readonly: true
            name: virtio-drivers
          interfaces:
          - masquerade: {}
            name: default
            model: virtio
            ports:
            - port: 3389
          inputs:
          - type: tablet
            bus: usb
            name: tablet
          tpm: {}
        memory:
          guest: 4Gi
        resources: {}
      networks:
      - name: default
        pod: {}
      volumes:
      - name: rootdisk
        dataVolume:
          name: rootdisk
      - name: windows-iso
        hostDisk:
          # Path to the Windows installation ISO on the host
          path: /path/to/windows.iso
          type: DiskOrFail
      - name: virtio-drivers
        hostDisk:
          # Path to the virtio-win ISO on the host
          # Download from https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/stable-virtio/
          path: /path/to/virtio-win.iso
          type: DiskOrFail
