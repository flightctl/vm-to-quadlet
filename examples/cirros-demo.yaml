apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: demo-vm
spec:
  running: true
  template:
    spec:
      domain:
        resources:
          requests:
            memory: 128Mi
            cpu: 1
        devices:
          disks:
          - name: rootdisk
            disk:
              bus: virtio
      volumes:
      - name: rootdisk
        hostDisk:
          # Minimal demo: boot CirrOS from a local disk image.
          # Download: https://download.cirros-cloud.net/0.6.3/cirros-0.6.3-x86_64-disk.img
          path: /tmp/cirros.qcow2
          type: Disk
