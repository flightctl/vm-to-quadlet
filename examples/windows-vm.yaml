apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: windows-vm
spec:
  running: true
  dataVolumeTemplates:
  - metadata:
      name: rootdisk
    spec:
      # blank source: converter creates an empty disk image on first boot.
      # If disk.img already exists in the named volume it is left untouched.
      source:
        blank: {}
      storage:
        resources:
          requests:
            storage: 60Gi
  template:
    spec:
      domain:
        firmware:
          bootloader:
            efi:
              secureBoot: false
        cpu:
          cores: 2
          sockets: 1
          threads: 1
        features:
          acpi:
            enabled: true
          apic:
            enabled: true
          hyperv:
            relaxed:    { enabled: true }
            vapic:      { enabled: true }
            spinlocks:  { enabled: true, spinlocks: 8191 }
            vpindex:    { enabled: true }
            runtime:    { enabled: true }
            synic:      { enabled: true }
            synictimer: { enabled: true, direct: { enabled: true } }
            reset:      { enabled: true }
            frequencies: { enabled: true }
            tlbflush:   { enabled: true }
            ipi:        { enabled: true }
            stimer:     { enabled: true }
        clock:
          utc: {}
          timer:
            hpet: { present: false }
            pit: { tickPolicy: delay }
            rtc: { tickPolicy: catchup }
            hyperv: { present: true }
        devices:
          autoattachMemBalloon: false
          disks:
          - disk:
              bus: virtio
            cache: writeback
            dedicatedIOThread: true
            name: rootdisk
            bootOrder: 2
          - cdrom:
              bus: sata
              readonly: true
            name: windows-iso
            bootOrder: 1
          - cdrom:
              bus: sata
              readonly: true
            name: virtio-drivers
          interfaces:
          - masquerade: {}
            name: default
            model: virtio
            ports:
            - port: 3389
          inputs:
          - type: tablet
            bus: usb
            name: tablet
          tpm: {}
        memory:
          guest: 4Gi
        resources: {}
      networks:
      - name: default
        pod: {}
      volumes:
      - name: rootdisk
        dataVolume:
          name: rootdisk
      - name: windows-iso
        hostDisk:
          path: /home/abennata/Downloads/Win11_25H2_English_x64_v2.iso
          type: DiskOrFail
      - name: virtio-drivers
        hostDisk:
          # Download from https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/stable-virtio/
          path: /home/abennata/Downloads/virtio-win.iso
          type: DiskOrFail
